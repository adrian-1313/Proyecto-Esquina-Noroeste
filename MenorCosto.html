<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Método de Menor Costo</title>

    <style>
        body {
            background-image: url("imgs/bg2.jpg");
            background-size: cover;
            background-position: center;
            font-family: Arial;
            text-align: center;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            background: black;
            color: white;
            padding: 15px;
            margin: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .fila {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin: 20px auto;
        }

        input {
            width: 70px;
            padding: 6px;
            margin-top: 5px;
        }

        .btn {
            background: black;
            color: #ddd;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: scale(0.95); }

        table {
            border-collapse: collapse;
            margin: 20px auto;
            width: 100%;
            font-size: 16px;
        }

        td, th {
            border: 1px solid #ddd;
            padding: 10px;
        }

        tr:nth-child(even) { background-color: #fafafa; }

        .usada {
            background-color: #e8f5e9;
            border: 2px solid #4caf50;
        }

        .ficticia {
            background: #e0e0e0;
            font-weight: bold;
        }

        .oferta-demanda-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .error { color: black; }

        p {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin: 20px auto;
        }
    </style>
</head>

<body>

<h1>Método de Menor Costo</h1>

<div class="container">

    <div class="fila">
        <div class="card">
            <h3>Cantidad de Ofertas</h3>
            <input type="number" id="numOfertas" min="1">
        </div>
        <div class="card">
            <h3>Cantidad de Demandas</h3>
            <input type="number" id="numDemandas" min="1">
        </div>
    </div>

    <button class="btn" onclick="generarInputs()">Generar Tabla</button>

    <div id="inputsContainer"></div>

    <button class="btn" onclick="calcular()">Validar Totales</button>
    <button class="btn" onclick="reiniciar()">Reiniciar</button>
    <button class="btn" onclick="volverInicio()">Volver al Inicio</button>

    <!-- Se muestra solo después de validar -->
    <button id="btnResolver" class="btn" onclick="resolver()" style="display:none;">
        Generar Tabla y Resolver
    </button>

    <!-- Card de resultados / balance -->
    <div class="card">
        <p id="resultado" class="error"></p>
        <p id="resultado1"></p>
        <p id="resultado2"></p>
        <div id="ficticioContainer"></div>
    </div>

    <!-- Tabla resuelta -->
    <div id="tablaResultado" class="card"></div>

    <!-- Se muestra solo después de resolver -->
    <button id="btnCalcularCosto" class="btn" onclick="calcularCostoTotal()" style="display:none;">
        Calcular Solución Inicial
    </button>

    <div id="solucionInicial" class="card" style="display:none;"></div>

</div>

<script src="MenorCosto.js"></script>

</body>
</html>
