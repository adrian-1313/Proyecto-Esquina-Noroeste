<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Método Esquina Noroeste</title>

    <style>
        body {
            background-image: url("imgs/bg2.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial;
            text-align: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 32px;
            background-color: black;
            color: white;
            padding: 15px;
            margin: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .resultado-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        #tablaResultado {
            flex: 2;
            min-width: 400px;
        }

        .resultado-container .card:first-child {
            flex: 1;
            margin-top: 60px;
            max-width: 300px;
        }

        .fila {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin: 20px auto;
        }

        input {
            width: 70px;
            padding: 6px;
            margin-top: 5px;
        }

        .btn {
            background: black;
            color: #ddd;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: scale(0.95); }

        table {
            border-collapse: collapse;
            margin: 20px auto;
            font-size: 16px;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
        }

        th {
            background-color: #f1f1f1;
            padding: 10px;
        }

        td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        tr:nth-child(even) { background-color: #fafafa; }

        .usada {
            background-color: #e8f5e9;
            border: 2px solid #4caf50;
        }

        .ficticia {
            background-color: #e0e0e0;
            font-weight: bold;
        }

        .error { color: black; }

        .oferta-demanda-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        p {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin: 20px auto;
        }
    </style>
</head>

<body>

<h1>Método de la Esquina Noroeste</h1>

<div class="container">

    <div class="fila">
        <div class="card">
            <h3>Cantidad de Ofertas</h3>
            <input type="number" min="1" id="numOfertas">
        </div>
        <div class="card">
            <h3>Cantidad de Demandas</h3>
            <input type="number" min="1" id="numDemandas">
        </div>
    </div>

    <button class="btn" onclick="generarInputs()">Generar Tabla</button>

    <div id="inputsContainer"></div>

    <button class="btn" onclick="calcular()">Validar Totales</button>
    <button class="btn" onclick="reiniciar()">Reiniciar</button>
    <button class="btn" onclick="window.location.href='index.html'">Volver al Inicio</button>

    <!-- Se muestra solo después de validar -->
    <button id="btnResolver" class="btn" onclick="resolverTabla()" style="display:none;">
        Generar Tabla y Resolver
    </button>

    <br><br>

    <div class="resultado-container">

        <div class="card">
            <p id="resultado" class="error"></p>
            <p id="resultado1"></p>
            <p id="resultado2"></p>
            <div id="ficticioContainer"></div>
        </div>

        <div id="tablaResultado" class="card"></div>

    </div>

    <!-- Se muestra solo después de resolver -->
    <button id="btnCalcularCosto" class="btn" onclick="calcularCostoTotal()" style="display:none;">
        Calcular Solución Inicial
    </button>

    <div id="solucionInicial" class="card" style="display:none;"></div>

</div>

<script src="Esquina_N.js"></script>

</body>
</html>
